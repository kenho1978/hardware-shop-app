<!DOCTYPE html>
<html>
<head>
    <title>Camera Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family: sans-serif; padding: 20px; text-align: center;">
    <h1>📷 Camera Test</h1>
    
    <h3>Option 1: Big Button</h3>
    <button onclick="document.getElementById('camera1').click()" style="padding: 30px 50px; font-size: 20px; background: #C8483F; color: white; border: none; border-radius: 10px; cursor: pointer;">
        📸 TAP TO TAKE PHOTO
    </button>
    <input type="file" id="camera1" accept="image/*" capture="environment" onchange="preview(this)" style="display: none;">
    
    <br><br>
    
    <h3>Option 2: Standard Input</h3>
    <input type="file" accept="image/*" capture="environment" onchange="preview(this)" style="font-size: 18px;">
    
    <br><br>
    
    <img id="preview" style="max-width: 100%; max-height: 300px; display: none; border: 2px solid #ccc; border-radius: 8px;">
    
    <p id="status" style="margin-top: 20px; color: green;"></p>
    
    <script>
        function preview(input) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').style.display = 'block';
                    document.getElementById('status').textContent = '✅ Photo selected: ' + input.files[0].name + ' (' + Math.round(input.files[0].size/1024) + 'KB)';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
