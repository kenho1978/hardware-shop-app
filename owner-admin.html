<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新天利管理後台 | Sun Tin Lee Admin</title>
    <style>
        :root {
            --bg-cream: #F3EDE6;
            --bg-clean: #FAF8F5;
            --text-navy: #222D3E;
            --accent-red: #C8483F;
            --logo-grey: #81766D;
            --white: #FFFFFF;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: var(--bg-cream);
            color: var(--text-navy);
            min-height: 100vh;
            padding-bottom: 20px;
        }
        
        /* Header */
        .header {
            background: var(--text-navy);
            color: var(--white);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-logo {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            object-fit: contain;
        }
        
        .header-title {
            font-size: 18px;
            font-weight: 700;
        }
        
        .header-subtitle {
            font-size: 11px;
            opacity: 0.8;
        }
        
        /* Navigation */
        .nav {
            background: var(--white);
            padding: 12px 20px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            border-bottom: 1px solid rgba(34,45,62,0.1);
            position: sticky;
            top: 72px;
            z-index: 99;
        }
        
        .nav-btn {
            padding: 10px 16px;
            border: none;
            background: transparent;
            color: var(--text-navy);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .nav-btn.active {
            background: var(--accent-red);
            color: var(--white);
        }
        
        /* Main Content */
        .main {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: var(--white);
            padding: 16px;
            border-radius: 10px;
            border: 1px solid rgba(34,45,62,0.1);
            text-align: center;
        }
        
        .stat-label {
            font-size: 10px;
            color: var(--logo-grey);
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-navy);
        }
        
        .stat-value.red { color: var(--accent-red); }
        
        /* Section */
        .section {
            display: none;
        }
        
        .section.active {
            display: block;
        }
        
        .card {
            background: var(--white);
            border-radius: 10px;
            border: 1px solid rgba(34,45,62,0.1);
            margin-bottom: 16px;
            overflow: hidden;
        }
        
        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(34,45,62,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-title {
            font-size: 15px;
            font-weight: 600;
        }
        
        /* Table */
        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        .table th {
            text-align: left;
            padding: 12px 16px;
            font-size: 10px;
            color: var(--logo-grey);
            text-transform: uppercase;
            border-bottom: 1px solid rgba(34,45,62,0.1);
            background: #fafafa;
        }
        
        .table td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(34,45,62,0.05);
        }
        
        .table tr:hover {
            background: rgba(200, 72, 63, 0.03);
        }
        
        /* Status Badge */
        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
        }
        
        .status-pending { background: #FEF3C7; color: #92400E; }
        .status-paid { background: #D1FAE5; color: #065F46; }
        
        /* Buttons */
        .btn {
            padding: 8px 14px;
            border: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
        }
        
        .btn-primary {
            background: var(--accent-red);
            color: var(--white);
        }
        
        .btn-secondary {
            background: var(--text-navy);
            color: var(--white);
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
        }
        
        /* Form */
        .form-grid {
            display: grid;
            gap: 12px;
            padding: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .form-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--logo-grey);
        }
        
        .form-input, .form-select {
            padding: 10px 12px;
            border: 1px solid rgba(34,45,62,0.2);
            border-radius: 6px;
            font-size: 14px;
        }
        
        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--accent-red);
        }
        
        /* Image Upload */
        .image-upload {
            border: 2px dashed rgba(34,45,62,0.2);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
        }
        
        .image-upload:hover {
            border-color: var(--accent-red);
        }
        
        .image-preview {
            max-width: 150px;
            max-height: 150px;
            margin: 10px auto;
            display: block;
            border-radius: 8px;
        }
        
        /* QR Section */
        .qr-section {
            padding: 20px;
            text-align: center;
        }
        
        .qr-code {
            background: #f0f0f0;
            width: 180px;
            height: 180px;
            margin: 0 auto 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--logo-grey);
        }
        
        .qr-amount {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent-red);
            margin-bottom: 8px;
        }
        
        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            padding: 20px;
        }
        
        .product-item {
            border: 1px solid rgba(34,45,62,0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .product-img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            background: #f0f0f0;
        }
        
        .product-info {
            padding: 10px;
        }
        
        .product-name {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .product-price {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-red);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .table { font-size: 11px; }
            .table th, .table td { padding: 10px 8px; }
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-navy);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            display: none;
        }
        
        .toast.show {
            display: block;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { bottom: -50px; opacity: 0; }
            to { bottom: 20px; opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <img src="Logo.jpg" class="header-logo">
            <div>
                <div class="header-title">新天利管理後台</div>
                <div class="header-subtitle">SUN TIN LEE ADMIN</div>
            </div>
        </div>
        <div style="font-size: 11px; opacity: 0.8;">Est. 1992</div>
    </div>
    
    <!-- Navigation -->
    <div class="nav">
        <button class="nav-btn active" onclick="showSection('orders', this)">📦 訂單</button>
        <button class="nav-btn" onclick="showSection('products', this)">🏷️ 產品</button>
        <button class="nav-btn" onclick="showSection('add', this)">➕ 添加</button>
        <button class="nav-btn" onclick="showSection('qr', this)">💳 QR</button>
        <button class="nav-btn" onclick="showSection('settings', this)">⚙️ 設定</button>
    </div>
    
    <!-- Main Content -->
    <div class="main">
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">總訂單</div>
                <div class="stat-value" id="totalOrders">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">待處理</div>
                <div class="stat-value red" id="pendingOrders">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">總產品</div>
                <div class="stat-value" id="totalProducts">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">已完成</div>
                <div class="stat-value" id="completedOrders">0</div>
            </div>
        </div>
        
        <!-- Orders Section -->
        <div class="section active" id="ordersSection">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">📦 訂單列表 ORDER LIST</div>
                    <button class="btn btn-outline" onclick="loadOrders()">🔄 刷新</button>
                </div>
                <table class="table">
                    <thead>
                        <tr>
                            <th>訂單號</th>
                            <th>客戶</th>
                            <th>金額</th>
                            <th>狀態</th>
                            <th>時間</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTable">
                        <tr><td colspan="5" style="text-align: center; padding: 40px; color: var(--logo-grey);">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- Products Section -->
        <div class="section" id="productsSection">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">🏷️ 產品目錄 PRODUCT CATALOG</div>
                    <button class="btn btn-outline" onclick="showAddProduct()">➕ 添加</button>
                </div>
                <div class="product-grid" id="productsGrid">
                    <p style="padding: 40px; text-align: center; color: var(--logo-grey);">Loading products...</p>
                </div>
            </div>
        </div>
        
        <!-- Edit Product Modal -->
        <div id="editModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center;">
            <div style="background: white; padding: 24px; border-radius: 12px; width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto;">
                <h3 style="margin-bottom: 16px;">✏️ 編輯產品 EDIT PRODUCT</h3>
                <form >
                    <input type="hidden" id="editProductId">
                    <div class="form-group">
                        <label class="form-label">產品名稱 NAME *</label>
                        <input type="text" id="editProductName" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">描述 DESCRIPTION</label>
                        <input type="text" id="editProductDesc" class="form-input">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <div class="form-group">
                            <label class="form-label">價格 PRICE (HK$)</label>
                            <input type="number" id="editProductPrice" class="form-input" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">分類 CATEGORY</label>
                            <select id="editProductCategory" class="form-select">
                                <option value="Metal">金屬材料 METAL</option>
                                <option value="Decoration">裝飾材料 DECORATION</option>
                                <option value="Tools">工具 TOOLS</option>
                                <option value="Plumbing">水管 PLUMBING</option>
                                <option value="Electrical">電工 ELECTRICAL</option>
                                <option value="General">一般 GENERAL</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">圖片 IMAGE (可相機拍攝)</label>
                        <input type="file" id="editProductImage" accept="image/*" capture="environment" onchange="previewEditImage(this)" style="width: 100%; padding: 12px; border: 2px dashed #C8483F; border-radius: 8px; background: #fff;">
                        <div id="editUploadText" style="margin-top: 8px; font-size: 12px; color: #666;">選擇新照片或拍攝</div>
                        <img id="editImagePreview" style="max-width: 100%; max-height: 150px; margin-top: 10px; display: none; border-radius: 8px;">
                    </div>
                    <div style="display: flex; gap: 8px; margin-top: 16px;">
                        <button type="button" class="btn btn-primary" style="flex: 1;" onclick="handleEditProduct()">✅ 保存 SAVE</button>
                        <button type="button" onclick="closeEditModal()" class="btn btn-outline" style="flex: 1;">❌ 取消 CANCEL</button>
                    </div>
                    <div style="margin-top: 12px; text-align: center;">
                        <button type="button" onclick="deleteCurrentProduct()" class="btn" style="background: #dc3545; color: white; width: 100%;">🗑️ 刪除產品 DELETE</button>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- Add Product Section -->
        <div class="section" id="addSection">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">➕ 添加產品 ADD PRODUCT</div>
                </div>
                <form onsubmit="handleAddProduct(event)">
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">產品名稱 NAME *</label>
                            <input type="text" id="productName" class="form-input" required placeholder="e.g. 304不鏽鋼板">
                        </div>
                        <div class="form-group">
                            <label class="form-label">描述 DESCRIPTION</label>
                            <input type="text" id="productDesc" class="form-input" placeholder="e.g. 2毫米厚度">
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                            <div class="form-group">
                                <label class="form-label">價格 PRICE (HK$) *</label>
                                <input type="number" id="productPrice" class="form-input" required step="0.01" placeholder="1280.00">
                            </div>
                            <div class="form-group">
                                <label class="form-label">分類 CATEGORY</label>
                                <select id="productCategory" class="form-select">
                                    <option value="Metal">金屬材料 METAL</option>
                                    <option value="Decoration">裝飾材料 DECORATION</option>
                                    <option value="Tools">工具 TOOLS</option>
                                    <option value="Plumbing">水管 PLUMBING</option>
                                    <option value="Electrical">電工 ELECTRICAL</option>
                                    <option value="General">一般 GENERAL</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">產品圖片 IMAGE (可相機拍攝)</label>
                            <input type="file" id="productImage" accept="image/*" capture="environment" onchange="previewProductImage(this)" style="width: 100%; padding: 12px; border: 2px dashed #C8483F; border-radius: 8px; background: #fff;">
                            <div id="uploadText" style="margin-top: 8px; font-size: 12px; color: #666;">選擇照片或拍攝新照片</div>
                            <img id="productImagePreview" style="max-width: 100%; max-height: 150px; margin-top: 10px; display: none; border-radius: 8px;">
                        </div>
                        <button type="button" class="btn btn-primary" style="padding: 14px;" onclick="handleAddProduct()">✅ 保存產品 SAVE PRODUCT</button>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- QR Section -->
        <div class="section" id="qrSection">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">💳 PayMe QR 生成 PAYME QR</div>
                </div>
                <div class="qr-section">
                    <input type="number" id="qrAmount" class="form-input" style="width: 200px; text-align: center; margin: 0 auto;" placeholder="輸入金額" oninput="generateQR()">
                    <div class="qr-code" id="qrCode">
                        <span>QR CODE</span>
                    </div>
                    <div class="qr-amount" id="qrDisplay">HK$0.00</div>
                    <p style="color: var(--logo-grey); font-size: 13px;">顯示QR碼讓客戶掃描付款</p>
                </div>
            </div>
        </div>
        
        <!-- Settings Section -->
        <div class="section" id="settingsSection">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">⚙️ 商店設定 STORE SETTINGS</div>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">公司名稱 COMPANY</label>
                        <input type="text" class="form-input" value="新天利裝飾材料有限公司" readonly>
                    </div>
                    <div class="form-group">
                        <label class="form-label">地址 ADDRESS</label>
                        <input type="text" class="form-input" value="248 Lockhart Road, Wan Chai" readonly>
                    </div>
                    <div class="form-group">
                        <label class="form-label">電話 TEL</label>
                        <input type="text" class="form-input" value="(852) 2507 4944" readonly>
                    </div>
                    <div class="form-group">
                        <label class="form-label">PayMe 電話 PAYME PHONE</label>
                        <input type="text" id="paymePhone" class="form-input" placeholder="e.g. 91234567">
                    </div>
                    <button class="btn btn-secondary" onclick="saveSettings()">💾 保存設置</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast"></div>
    
    <script>
        // API Base URL - use relative path for tunnel
        const API = '/api';
        
        // Load on start
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });
        
        // Navigation
        function showSection(section, btn) {
            // Hide all sections
            var sections = document.querySelectorAll('.section');
            for (var i = 0; i < sections.length; i++) {
                sections[i].classList.remove('active');
            }
            
            // Remove active from all buttons
            var buttons = document.querySelectorAll('.nav-btn');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            
            // Show target section
            var targetSection = document.getElementById(section + 'Section');
            if (targetSection) {
                targetSection.classList.add('active');
            }
            
            // Add active to clicked button
            if (btn) {
                btn.classList.add('active');
            }
            
            // Load data for section
            if (section === 'orders') loadOrders();
            if (section === 'products') loadProducts();
        }
        
        // Load all data
        async function loadData() {
            await loadOrders();
            await loadProducts();
        }
        
        // Load Orders
        async function loadOrders() {
            try {
                const res = await fetch(API + '/admin/orders');
                const orders = await res.json();
                
                document.getElementById('totalOrders').textContent = orders.length;
                document.getElementById('pendingOrders').textContent = orders.filter(o => o.status === 'pending').length;
                document.getElementById('completedOrders').textContent = orders.filter(o => o.status === 'completed').length;
                
                const tbody = document.getElementById('ordersTable');
                if (orders.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px; color: var(--logo-grey);">No orders yet</td></tr>';
                    return;
                }
                
                tbody.innerHTML = orders.map(order => `
                    <tr>
                        <td><strong>${order.id || order.orderNumber || 'N/A'}</strong></td>
                        <td>${order.customerName || 'N/A'}</td>
                        <td><strong style="color: var(--accent-red);">HK$${(order.total || 0).toFixed(2)}</strong></td>
                        <td><span class="status-badge status-${order.status || 'pending'}">${order.status === 'completed' ? '已完成' : '待處理'}</span></td>
                        <td>${new Date(order.createdAt).toLocaleString('zh-HK')}</td>
                    </tr>
                `).join('');
            } catch (err) {
                showToast('Error loading orders');
            }
        }
        
        // Load Products
        async function loadProducts() {
            try {
                console.log('Fetching products...');
                const res = await fetch(API + '/products');
                console.log('Response status:', res.status);
                
                if (!res.ok) {
                    throw new Error('HTTP ' + res.status);
                }
                
                const products = await res.json();
                console.log('Products loaded:', products.length);
                
                document.getElementById('totalProducts').textContent = products.length;
                
                const grid = document.getElementById('productsGrid');
                if (products.length === 0) {
                    grid.innerHTML = '<p style="padding: 40px; text-align: center; color: var(--logo-grey);">No products yet. Click "添加" to add products!</p>';
                    return;
                }
                
                grid.innerHTML = products.map(p => `
                    <div class="product-item">
                        <img src="${p.image || 'https://via.placeholder.com/200x200?text=No+Image'}" class="product-img" onclick="editProduct('${p.id}')" style="cursor:pointer" onerror="this.src='https://via.placeholder.com/200x200?text=No+Image'">
                        <div class="product-info">
                            <div class="product-name" onclick="editProduct('${p.id}')" style="cursor:pointer">${p.name}</div>
                            <div class="product-price">HK$${(p.price || 0).toFixed(2)}</div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Load products error:', err);
                showToast('Error: ' + err.message);
            }
        }
        
        // Edit Product
        async function editProduct(id) {
            try {
                const res = await fetch(API + '/products/' + id);
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const product = await res.json();
                
                document.getElementById('editProductId').value = product.id;
                document.getElementById('editProductName').value = product.name;
                document.getElementById('editProductDesc').value = product.description || '';
                document.getElementById('editProductPrice').value = product.price;
                document.getElementById('editProductCategory').value = product.category || 'General';
                
                document.getElementById('editModal').style.display = 'flex';
            } catch (err) {
                alert('Error loading product: ' + err.message);
            }
        }
        
        // Preview Edit Image
        function previewEditImage(input) {
            var preview = document.getElementById('editImagePreview');
            var uploadText = document.getElementById('editUploadText');
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;

                reader.readAsDataURL(input.files[0]);
            }

        // Handle Edit Product
        async function handleEditProduct() {
            var id = document.getElementById('editProductId').value;
            var name = document.getElementById('editProductName').value;
            var price = parseFloat(document.getElementById('editProductPrice').value);
            
            if (!id || !name || !price) {
                alert('Missing data!');
                return;
            }
            
            var product = {
                name: name,
                description: document.getElementById('editProductDesc').value,
                price: price,
                category: document.getElementById('editProductCategory').value,
                image: 'https://via.placeholder.com/300x200?text=' + encodeURIComponent(name)
            };
            
            try {
                var res = await fetch(API + '/products/' + id, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(product)
                });
                
                if (res.ok) {
                    alert('✅ Updated!');
                    closeEditModal();
                    loadProducts();
                } else {
                    alert('Error: ' + res.status);
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }
        
        // Delete Current Product
        async function deleteCurrentProduct() {
            var id = document.getElementById('editProductId').value;
            if (!confirm('Delete this product?')) return;
            
            try {
                var res = await fetch(API + '/products/' + id, { method: 'DELETE' });
                if (res.ok) {
                    alert('🗑️ Deleted!');
                    closeEditModal();
                    loadProducts();
                } else {
                    alert('Error: ' + res.status);
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        // Handle Add Product
        async function handleAddProduct() {
            var name = document.getElementById('productName').value;

                alert('Please fill in product name and price!');
                return;
            }

                name: name,
                description: document.getElementById('productDesc').value,
                price: price,
                category: document.getElementById('productCategory').value,
                image: 'https://via.placeholder.com/300x200?text=' + encodeURIComponent(name)
            };
            
            try {

                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },

                });

                    alert('✅ Product saved!');
                    document.getElementById('productName').value = '';

                    document.getElementById('productPrice').value = '';
                    loadProducts();
                } else {
                    alert('Error: ' + res.status);
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }
        
        // Convert to Base64
        function toBase64(file) {
            return new Promise((resolve, reject) => {
                var reader = new FileReader();
                reader.onload = function(e) { resolve(e.target.result); };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
        
        // Generate QR
        function generateQR() {
            var amount = parseFloat(document.getElementById('qrAmount').value) || 0;
            document.getElementById('qrDisplay').textContent = 'HK$' + amount.toFixed(2);
            var phone = document.getElementById('paymePhone').value || '91234567';
            if (amount > 0) {
                var qrData = 'payme.hsbc.com.hk/pay?p=' + phone + '&am=' + amount + '&m=Order';
                document.getElementById('qrCode').innerHTML = '<img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=' + encodeURIComponent(qrData) + '" style="width: 180px; height: 180px;">';
            }
        }
        
        // Save Settings
        function saveSettings() {
            var phone = document.getElementById('paymePhone').value;
            localStorage.setItem('paymePhone', phone);
            showToast('✅ Settings saved!');
        }
        
        // Show Toast
        function showToast(message) {
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
