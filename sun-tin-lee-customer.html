<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新天利裝飾材料 | Sun Tin Lee</title>
    <style>
        :root {
            --bg-cream: #F3EDE6;
            --bg-clean: #FAF8F5;
            --text-navy: #222D3E;
            --accent-red: #C8483F;
            --logo-grey: #81766D;
            --white: #FFFFFF;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: var(--bg-cream);
            color: var(--text-navy);
            max-width: 400px;
            margin: 0 auto;
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        /* Header */
        .header {
            background: var(--accent-red);
            color: var(--white);
            padding: 16px 20px;
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo-img {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            object-fit: contain;
            background: white;
        }
        
        .company-name {
            font-size: 16px;
            font-weight: 700;
        }
        
        .company-name-en {
            font-size: 10px;
            opacity: 0.9;
        }
        
        /* Business Info */
        .business-info {
            background: var(--bg-clean);
            margin: 16px;
            padding: 16px;
            border-radius: 10px;
            border: 1px solid rgba(34,45,62,0.1);
        }
        
        .info-row {
            display: flex;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        
        .info-row:last-child { margin-bottom: 0; }
        
        .info-icon {
            width: 24px;
            height: 24px;
            background: var(--accent-red);
            color: white;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            margin-right: 10px;
        }
        
        .info-content { flex: 1; }
        
        .info-label {
            font-size: 10px;
            color: var(--logo-grey);
            margin-bottom: 2px;
        }
        
        .info-value {
            font-size: 13px;
            font-weight: 500;
        }
        
        /* Language Toggle */
        .lang-toggle {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 0 16px 16px 16px;
        }
        
        .lang-btn {
            padding: 8px 20px;
            border: 2px solid var(--text-navy);
            background: transparent;
            color: var(--text-navy);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 20px;
        }
        
        .lang-btn.active {
            background: var(--text-navy);
            color: white;
        }
        
        /* Categories */
        .categories {
            padding: 0 16px;
            margin-bottom: 16px;
        }
        
        .section-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-navy);
        }
        
        .category-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        
        .category-card {
            background: white;
            border: 1px solid rgba(34,45,62,0.1);
            border-radius: 8px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .category-card:hover, .category-card.active {
            border-color: var(--accent-red);
        }
        
        .category-card.active {
            background: var(--accent-red);
            color: white;
        }
        
        .category-icon { font-size: 20px; margin-bottom: 4px; }
        
        .category-name { font-size: 10px; font-weight: 600; }
        
        /* Products */
        .products { padding: 0 16px; }
        
        .product-card {
            background: white;
            border: 1px solid rgba(34,45,62,0.1);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
        }
        
        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        
        .product-name { font-size: 14px; font-weight: 600; flex: 1; }
        
        .product-price {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent-red);
        }
        
        .product-desc {
            font-size: 12px;
            color: var(--logo-grey);
            margin-bottom: 10px;
            line-height: 1.4;
        }
        
        .product-img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 6px;
            background: #f0f0f0;
            margin-bottom: 10px;
        }
        
        .add-to-cart {
            width: 100%;
            padding: 10px;
            background: var(--text-navy);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .add-to-cart:hover { background: var(--accent-red); }
        
        /* Cart Summary */
        .cart-summary {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 400px;
            background: var(--text-navy);
            color: white;
            padding: 14px 16px;
            display: none;
            z-index: 100;
        }
        
        .cart-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .cart-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .cart-count {
            width: 28px;
            height: 28px;
            background: var(--accent-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
        }
        
        .cart-total { font-size: 18px; font-weight: 700; }
        
        .checkout-btn {
            padding: 10px 20px;
            background: var(--accent-red);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 16px 32px;
            border-radius: 8px;
            font-size: 16px;
            z-index: 1000;
            display: none;
        }
        
        .toast.show { display: block; animation: fadeIn 0.3s; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-top">
            <div class="logo-area">
                <img src="Logo.jpg" class="logo-img" onerror="this.style.display='none'">
                <div>
                    <div class="company-name">新天利裝飾材料有限公司</div>
                    <div class="company-name-en">SUN TIN LEE</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Business Info -->
    <div class="business-info">
        <div class="info-row">
            <div class="info-icon">📍</div>
            <div class="info-content">
                <div class="info-label" id="addrLabel">地址 ADDRESS</div>
                <div class="info-value" id="addrValue">248 Lockhart Road, Wan Chai</div>
            </div>
        </div>
        <div class="info-row">
            <div class="info-icon">📞</div>
            <div class="info-content">
                <div class="info-label" id="phoneLabel">電話 TEL</div>
                <div class="info-value" id="phoneValue">(852) 2507 4944</div>
            </div>
        </div>
    </div>
    
    <!-- Language Toggle -->
    <div class="lang-toggle">
        <button class="lang-btn active" id="btnEn" onclick="setLang('en')">ENGLISH</button>
        <button class="lang-btn" id="btnZh" onclick="setLang('zh')">中文</button>
    </div>
    
    <!-- Categories -->
    <div class="categories">
        <div class="section-title" id="catTitle">產品分類</div>
        <div class="category-grid">
            <div class="category-card active" onclick="filterCategory('all')">
                <div class="category-icon">🛒</div>
                <div class="category-name" id="catAll">全部</div>
            </div>
            <div class="category-card" onclick="filterCategory('metal')">
                <div class="category-icon">🔩</div>
                <div class="category-name" id="catMetal">金屬</div>
            </div>
            <div class="category-card" onclick="filterCategory('decoration')">
                <div class="category-icon">🎨</div>
                <div class="category-name" id="catDeco">裝飾</div>
            </div>
            <div class="category-card" onclick="filterCategory('tools')">
                <div class="category-icon">🛠️</div>
                <div class="category-name" id="catTools">工具</div>
            </div>
        </div>
    </div>
    
    <!-- Products -->
    <div class="products" id="productsList"></div>
    
    <!-- Cart Summary -->
    <div class="cart-summary" id="cartSummary">
        <div class="cart-content">
            <div class="cart-info">
                <div class="cart-count" id="cartCount">0</div>
                <div class="cart-total" id="cartTotal">HK$0.00</div>
            </div>
            <button class="checkout-btn" id="checkoutBtn" onclick="checkout()">結帳</button>
        </div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast"></div>
    
    <script>
        // Translations
        const t = {
            en: {
                addrLabel: 'ADDRESS',
                addrValue: '248 Lockhart Road, Wan Chai, Hong Kong',
                phoneLabel: 'TEL',
                phoneValue: '(852) 2507 4944',
                catTitle: 'PRODUCT CATEGORIES',
                catAll: 'ALL',
                catMetal: 'METAL',
                catDeco: 'DECO',
                catTools: 'TOOLS',
                products: 'PRODUCTS',
                addToCart: 'ADD TO CART',
                added: 'ADDED!',
                checkout: 'CHECKOUT',
                total: 'TOTAL',
                items: 'ITEMS',
                empty: 'No products yet'
            },
            zh: {
                addrLabel: '地址',
                addrValue: '香港灣仔駱克道248號',
                phoneLabel: '電話',
                phoneValue: '(852) 2507 4944',
                catTitle: '產品分類',
                catAll: '全部',
                catMetal: '金屬材料',
                catDeco: '裝飾材料',
                catTools: '工具',
                products: '產品',
                addToCart: '加入購物車',
                added: '已加入！',
                checkout: '結帳',
                total: '總計',
                items: '件商品',
                empty: '暫無產品'
            }
        };
        
        let currentLang = 'zh';
        let cart = [];
        let products = [];
        
        // Load products from API
        async function loadProducts() {
            try {
                // Use relative URL - works through tunnel
                const res = await fetch('/api/products');
                products = await res.json();
                renderProducts();
            } catch (err) {
                document.getElementById('productsList').innerHTML = '<p style="text-align:center;padding:40px;color:#81766D;">' + t[currentLang].empty + '</p>';
            }
        }
        
        // Render products
        function renderProducts() {
            const list = document.getElementById('productsList');
            if (products.length === 0) {
                list.innerHTML = '<p style="text-align:center;padding:40px;color:#81766D;">' + t[currentLang].empty + '</p>';
                return;
            }
            
            list.innerHTML = products.map(p => `
                <div class="product-card">
                    <img src="${p.image || 'https://via.placeholder.com/300x200?text=No+Image'}" class="product-img" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
                    <div class="product-header">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">HK$${p.price.toFixed(2)}</div>
                    </div>
                    <div class="product-desc">${p.description || ''}</div>
                    <button class="add-to-cart" onclick="addToCart(${p.id})">${t[currentLang].addToCart}</button>
                </div>
            `).join('');
        }
        
        // Filter by category
        function filterCategory(cat) {
            document.querySelectorAll('.category-card').forEach(c => c.classList.remove('active'));
            event.target.closest('.category-card').classList.add('active');
            
            if (cat === 'all') {
                renderProducts();
            } else {
                const filtered = products.filter(p => p.category === cat);
                const list = document.getElementById('productsList');
                if (filtered.length === 0) {
                    list.innerHTML = '<p style="text-align:center;padding:40px;color:#81766D;">' + t[currentLang].empty + '</p>';
                } else {
                    list.innerHTML = filtered.map(p => `
                        <div class="product-card">
                            <img src="${p.image || 'https://via.placeholder.com/300x200?text=No+Image'}" class="product-img" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
                            <div class="product-header">
                                <div class="product-name">${p.name}</div>
                                <div class="product-price">HK$${p.price.toFixed(2)}</div>
                            </div>
                            <div class="product-desc">${p.description || ''}</div>
                            <button class="add-to-cart" onclick="addToCart(${p.id})">${t[currentLang].addToCart}</button>
                        </div>
                    `).join('');
                }
            }
        }
        
        // Set language
        function setLang(lang) {
            currentLang = lang;
            
            document.getElementById('btnEn').classList.toggle('active', lang === 'en');
            document.getElementById('btnZh').classList.toggle('active', lang === 'zh');
            
            const tx = t[lang];
            document.getElementById('addrLabel').textContent = tx.addrLabel;
            document.getElementById('addrValue').textContent = tx.addrValue;
            document.getElementById('phoneLabel').textContent = tx.phoneLabel;
            document.getElementById('phoneValue').textContent = tx.phoneValue;
            document.getElementById('catTitle').textContent = tx.catTitle;
            document.getElementById('catAll').textContent = tx.catAll;
            document.getElementById('catMetal').textContent = tx.catMetal;
            document.getElementById('catDeco').textContent = tx.catDeco;
            document.getElementById('catTools').textContent = tx.catTools;
            document.getElementById('checkoutBtn').textContent = tx.checkout;
            
            renderProducts();
        }
        
        // Add to cart
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            if (product) {
                cart.push(product);
                updateCart();
                showToast(t[currentLang].added);
            }
        }
        
        // Update cart display
        function updateCart() {
            const summary = document.getElementById('cartSummary');
            if (cart.length > 0) {
                summary.style.display = 'block';
                const total = cart.reduce((sum, p) => sum + p.price, 0);
                document.getElementById('cartCount').textContent = cart.length;
                document.getElementById('cartTotal').textContent = 'HK$' + total.toFixed(2);
            } else {
                summary.style.display = 'none';
            }
        }
        
        // Show toast
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1500);
        }
        
        // Checkout
        function checkout() {
            if (cart.length === 0) return;
            const total = cart.reduce((sum, p) => sum + p.price, 0);
            alert('Order Total: HK$' + total.toFixed(2) + '\n\nPayMe QR would appear here.');
        }
        
        // Init
        loadProducts();
    </script>
</body>
</html>
