<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware Shop Admin - 五金商店管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        .language-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 5px;
        }
        .lang-btn {
            background: #007AFF;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .lang-btn.active {
            background: #0056b3;
            font-weight: bold;
        }
        .order-card {
            transition: transform 0.2s;
            margin-bottom: 15px;
        }
        .order-card:hover {
            transform: translateY(-2px);
        }
        .status-badge {
            font-size: 0.8em;
            padding: 4px 8px;
        }
        .status-pending {
            background: #ffc107;
            color: #000;
        }
        .status-paid {
            background: #28a745;
            color: #fff;
        }
        .status-processing {
            background: #17a2b8;
            color: #fff;
        }
        .status-delivered {
            background: #6c757d;
            color: #fff;
        }
        .bilingual-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .chinese-text {
            font-size: 0.9em;
            color: #666;
        }
    </style>
</head>
<body>
    <!-- Language Switcher -->
    <div class="language-switcher">
        <button class="lang-btn active" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" onclick="setLanguage('zh')">中文</button>
    </div>

    <div class="container">
        <div class="row mb-4">
            <div class="col">
                <h1 class="display-5">🛠️ <span id="adminTitle">Hardware Shop Admin</span></h1>
                <p class="lead" id="adminSubtitle">Manage orders and update payment status</p>
                <div class="alert alert-info" id="adminInstructions">
                    <strong>PayMe Instructions:</strong> Check your PayMe app for payments. When payment received, mark order as "paid".
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card text-white bg-primary">
                    <div class="card-body">
                        <h5 class="card-title" id="totalOrdersTitle">Total Orders</h5>
                        <h2 id="totalOrders" class="card-text">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-warning">
                    <div class="card-body">
                        <h5 class="card-title" id="pendingOrdersTitle">Pending Payment</h5>
                        <h2 id="pendingOrders" class="card-text">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-success">
                    <div class="card-body">
                        <h5 class="card-title" id="paidOrdersTitle">Paid</h5>
                        <h2 id="paidOrders" class="card-text">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-info">
                    <div class="card-body">
                        <h5 class="card-title" id="deliveredOrdersTitle">Delivered</h5>
                        <h2 id="deliveredOrders" class="card-text">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0" id="allOrdersTitle">All Orders</h5>
                        <button class="btn btn-sm btn-primary" onclick="loadOrders()">
                            <span class="spinner-border spinner-border-sm d-none" id="loadingSpinner"></span>
                            <span id="refreshBtn">Refresh</span>
                        </button>
                    </div>
                    <div class="card-body">
                        <div id="ordersContainer">
                            <div class="text-center py-5">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                                <p class="mt-3" id="loadingText">Loading orders...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:4000/api';
        let currentLanguage = 'en';
        
        // Translations
        const translations = {
            en: {
                adminTitle: 'Hardware Shop Admin',
                adminSubtitle: 'Manage orders and update payment status',
                adminInstructions: '<strong>PayMe Instructions:</strong> Check your PayMe app for payments. When payment received, mark order as "paid".',
                totalOrdersTitle: 'Total Orders',
                pendingOrdersTitle: 'Pending Payment',
                paidOrdersTitle: 'Paid',
                deliveredOrdersTitle: 'Delivered',
                allOrdersTitle: 'All Orders',
                refreshBtn: 'Refresh',
                loadingText: 'Loading orders...',
                noOrdersText: 'No orders yet.',
                order: 'Order',
                customer: 'Customer',
                items: 'Items',
                shipping: 'Shipping',
                total: 'Total',
                paymeReference: 'PayMe reference',
                markAsPaid: 'Mark as Paid',
                startProcessing: 'Start Processing',
                markAsDelivered: 'Mark as Delivered',
                viewDetails: 'View Details',
                pending_payment: 'Pending Payment',
                paid: 'Paid',
                processing: 'Processing',
                delivered: 'Delivered',
                confirmStatusChange: 'Change order {{orderId}} to {{newStatus}}?',
                statusUpdated: 'Order status updated!',
                failedUpdate: 'Failed to update status',
                errorUpdate: 'Error updating status',
                errorLoading: 'Failed to load orders. Make sure backend is running.'
            },
            zh: {
                adminTitle: '五金商店管理',
                adminSubtitle: '管理訂單及更新付款狀態',
                adminInstructions: '<strong>PayMe指示：</strong>檢查你的PayMe應用程式收款。收到款項後，將訂單標記為「已付款」。',
                totalOrdersTitle: '總訂單',
                pendingOrdersTitle: '等待付款',
                paidOrdersTitle: '已付款',
                deliveredOrdersTitle: '已送貨',
                allOrdersTitle: '所有訂單',
                refreshBtn: '刷新',
                loadingText: '載入訂單中...',
                noOrdersText: '暫無訂單。',
                order: '訂單',
                customer: '客戶',
                items: '項目',
                shipping: '送貨',
                total: '總計',
                paymeReference: 'PayMe參考',
                markAsPaid: '標記為已付款',
                startProcessing: '開始處理',
                markAsDelivered: '標記為已送貨',
                viewDetails: '查看詳情',
                pending_payment: '等待付款',
                paid: '已付款',
                processing: '處理中',
                delivered: '已送貨',
                confirmStatusChange: '將訂單 {{orderId}} 更改為 {{newStatus}}？',
                statusUpdated: '訂單狀態已更新！',
                failedUpdate: '更新狀態失敗',
                errorUpdate: '更新狀態時出錯',
                errorLoading: '載入訂單失敗。請確保後端正在運行。'
            }
        };
        
        function setLanguage(lang) {
            currentLanguage = lang;
            
            // Update language buttons
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Update all text
            updateTranslations();
            
            // Reload orders to update status badges
            if (document.getElementById('ordersContainer').children.length > 1) {
                loadOrders();
            }
        }
        
        function updateTranslations() {
            // Update static text
            document.getElementById('adminTitle').textContent = translations[currentLanguage].adminTitle;
            document.getElementById('adminSubtitle').textContent = translations[currentLanguage].adminSubtitle;
            document.getElementById('adminInstructions').innerHTML = translations[currentLanguage].adminInstructions;
            document.getElementById('totalOrdersTitle').textContent = translations[currentLanguage].totalOrdersTitle;
            document.getElementById('pendingOrdersTitle').textContent = translations[currentLanguage].pendingOrdersTitle;
            document.getElementById('paidOrdersTitle').textContent = translations[currentLanguage].paidOrdersTitle;
            document.getElementById('deliveredOrdersTitle').textContent = translations[currentLanguage].deliveredOrdersTitle;
            document.getElementById('allOrdersTitle').textContent = translations[currentLanguage].allOrdersTitle;
            document.getElementById('refreshBtn').textContent = translations[currentLanguage].refreshBtn;
            document.getElementById('loadingText').textContent = translations[currentLanguage].loadingText;
        }
        
        async function loadOrders() {
            const spinner = document.getElementById('loadingSpinner');
            spinner.classList.remove('d-none');
            
            try {
                const response = await fetch(`${API_BASE}/admin/orders`);
                const orders = await response.json();
                
                updateStats(orders);
                renderOrders(orders);
            } catch (error) {
                console.error('Error loading orders:', error);
                document.getElementById('ordersContainer').innerHTML = `
                    <div class="alert alert-danger">
                        ${translations[currentLanguage].errorLoading}
                    </div>
                `;
            } finally {
                spinner.classList.add('d-none');
            }
        }
        
        function updateStats(orders) {
            document.getElementById('totalOrders').textContent = orders.length;
            document.getElementById('pendingOrders').textContent = 
                orders.filter(o => o.status === 'pending_payment').length;
            document.getElementById('paidOrders').textContent = 
                orders.filter(o => o.status === 'paid').length;
            document.getElementById('deliveredOrders').textContent = 
                orders.filter(o => o.status === 'delivered').length;
        }
        
        function renderOrders(orders) {
            if (orders.length === 0) {
                document.getElementById('ordersContainer').innerHTML = `
                    <div class="text-center py-5">
                        <p class="text-muted">${translations[currentLanguage].noOrdersText}</p>
                    </div>
                `;
                return;
            }
            
            // Sort by newest first
            orders.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            
            const ordersHtml = orders.map(order => `
                <div class="card order-card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <div>
                                <h5 class="card-title mb-1">${translations[currentLanguage].order} ${order.id}</h5>
                                <p class="text-muted mb-0">
                                    ${new Date(order.createdAt).toLocaleString()} • 
                                    ${order.customerName} • ${order.customerPhone}
                                </p>
                            </div>
                            <span class="badge status-badge status-${order.status.replace('_', '-')}">
                                ${translations[currentLanguage][order.status] || order.status}
                            </span>
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <h6>${translations[currentLanguage].items}:</h6>
                                <ul class="list-unstyled">
                                    ${order.items.map(item => `<li>• ${item.quantity} × ${translations[currentLanguage].order} ${item.productId}</li>`).join('')}
                                </ul>
                            </div>
                            <div class="col-md-6">
                                <h6>${translations[currentLanguage].shipping}:</h6>
                                <p class="mb-1">${order.shippingAddress.street}</p>
                                <p class="mb-1">${order.shippingAddress.district}, ${order.shippingAddress.city}</p>
                            </div>
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <strong>${translations[currentLanguage].total}: HK$${order.total.toFixed(2)}</strong>
                                <br>
                                <small class="text-muted">
                                    ${translations[currentLanguage].paymeReference}: ${translations[currentLanguage].order} ${order.id}
                                </small>
                            </div>
                            <div>
                                ${order.status === 'pending_payment' ? `
                                    <button class="btn btn-success btn-sm" onclick="updateStatus('${order.id}', 'paid')">
                                        ${translations[currentLanguage].markAsPaid}
                                    </button>
                                ` : order.status === 'paid' ? `
                                    <button class="btn btn-info btn-sm" onclick="updateStatus('${order.id}', 'processing')">
                                        ${translations[currentLanguage].startProcessing}
                                    </button>
                                ` : order.status === 'processing' ? `
                                    <button class="btn btn-secondary btn-sm" onclick="updateStatus('${order.id}', 'delivered')">
                                        ${translations[currentLanguage].markAsDelivered}
                                    </button>
                                ` : ''}
                                <button class="btn btn-outline-primary btn-sm ms-2" onclick="viewOrder('${order.id}')">
                                    ${translations[currentLanguage].viewDetails}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('ordersContainer').innerHTML = ordersHtml;
        }
        
        async function updateStatus(orderId, newStatus) {
            const confirmMessage = translations[currentLanguage].confirmStatusChange
                .replace('{{orderId}}', orderId)
                .replace('{{newStatus}}', translations[currentLanguage][newStatus] || newStatus);
            
            if (!confirm(confirmMessage)) return;
            
            try {
                const response = await fetch(`${API_BASE}/admin/orders/${orderId}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                
                if (response.ok) {
                    alert(translations[currentLanguage].statusUpdated);
                    loadOrders();
                } else {
                    alert(translations[currentLanguage].failedUpdate);
                }
            } catch (error) {
                console.error('Error updating status:', error);
                alert(translations[currentLanguage].errorUpdate);
            }
        }
        
        function viewOrder(orderId) {
            window.open(`${API_BASE}/orders/${orderId}`, '_blank');
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Try to detect user language
            const browserLang = navigator.language || 'en';
            if (browserLang.startsWith('zh')) {
                setLanguage('zh');
            } else {
                setLanguage('en');
            }
            
            loadOrders();
        });
        
        // Auto-refresh every 30 seconds
        setInterval(loadOrders, 30000);
    </script>
</body>
</html>
